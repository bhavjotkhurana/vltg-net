<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 200" width="380" height="200" font-family="system-ui, sans-serif">
  <rect width="380" height="200" fill="white"/>

  <!-- GRAPH 1 label -->
  <text x="90" y="14" text-anchor="middle" font-size="11" font-weight="600" fill="#6b7280">Graph 1</text>

  <!-- Graph 1: center (90,105), scale 20px/unit, range −4 to 4 -->
  <!-- Grid -->
  <g stroke="#f1f5f9" stroke-width="0.8">
    <line x1="10" y1="65"  x2="170" y2="65"/>
    <line x1="10" y1="85"  x2="170" y2="85"/>
    <line x1="10" y1="125" x2="170" y2="125"/>
    <line x1="10" y1="145" x2="170" y2="145"/>
    <line x1="30"  y1="25" x2="30"  y2="185"/>
    <line x1="50"  y1="25" x2="50"  y2="185"/>
    <line x1="110" y1="25" x2="110" y2="185"/>
    <line x1="130" y1="25" x2="130" y2="185"/>
    <line x1="150" y1="25" x2="150" y2="185"/>
  </g>
  <!-- Axes -->
  <line x1="10" y1="105" x2="172" y2="105" stroke="#374151" stroke-width="1.2"/>
  <line x1="90" y1="23"  x2="90"  y2="187" stroke="#374151" stroke-width="1.2"/>
  <!-- Tick marks & labels -->
  <line x1="70" y1="102" x2="70" y2="108" stroke="#374151" stroke-width="1"/>
  <text x="70" y="117" text-anchor="middle" font-size="9" fill="#9ca3af">−1</text>
  <line x1="110" y1="102" x2="110" y2="108" stroke="#374151" stroke-width="1"/>
  <text x="110" y="117" text-anchor="middle" font-size="9" fill="#9ca3af">1</text>
  <line x1="87" y1="85" x2="93" y2="85" stroke="#374151" stroke-width="1"/>
  <text x="84" y="89" text-anchor="end" font-size="9" fill="#9ca3af">1</text>
  <line x1="87" y1="125" x2="93" y2="125" stroke="#374151" stroke-width="1"/>
  <text x="84" y="129" text-anchor="end" font-size="9" fill="#9ca3af">−1</text>
  <!-- Dots at (0,−2) and (2,1) -->
  <circle cx="90" cy="145" r="3.5" fill="#F59E0B"/>
  <text x="95" y="148" font-size="9" fill="#6b7280">(0,−2)</text>
  <circle cx="130" cy="85" r="3.5" fill="#F59E0B"/>
  <text x="134" y="82" font-size="9" fill="#6b7280">(2,1)</text>
  <!-- Line through (0,-2) and (2,1): slope=1.5, y=1.5x−2
       At x=−4: y=−8 (clip), x=−1.33→y=−4, x=4→y=4
       SVG x: 90+x*20, SVG y: 105−y*20
       (−1.33,−4): (90−26.7, 105+80)=(63.3,185)
       (4,4): (90+80, 105−80)=(170,25) -->
  <line x1="63" y1="185" x2="170" y2="25" stroke="#1E3A5F" stroke-width="2"/>

  <!-- Divider -->
  <line x1="190" y1="20" x2="190" y2="185" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- GRAPH 2 label -->
  <text x="290" y="14" text-anchor="middle" font-size="11" font-weight="600" fill="#6b7280">Graph 2</text>

  <!-- Graph 2: center (290,105), scale 20px/unit, range −4 to 4 -->
  <!-- Grid -->
  <g stroke="#f1f5f9" stroke-width="0.8">
    <line x1="210" y1="65"  x2="370" y2="65"/>
    <line x1="210" y1="85"  x2="370" y2="85"/>
    <line x1="210" y1="125" x2="370" y2="125"/>
    <line x1="210" y1="145" x2="370" y2="145"/>
    <line x1="230" y1="25" x2="230" y2="185"/>
    <line x1="250" y1="25" x2="250" y2="185"/>
    <line x1="310" y1="25" x2="310" y2="185"/>
    <line x1="330" y1="25" x2="330" y2="185"/>
    <line x1="350" y1="25" x2="350" y2="185"/>
  </g>
  <!-- Axes -->
  <line x1="210" y1="105" x2="372" y2="105" stroke="#374151" stroke-width="1.2"/>
  <line x1="290" y1="23"  x2="290" y2="187" stroke="#374151" stroke-width="1.2"/>
  <!-- Tick marks & labels -->
  <line x1="270" y1="102" x2="270" y2="108" stroke="#374151" stroke-width="1"/>
  <text x="270" y="117" text-anchor="middle" font-size="9" fill="#9ca3af">−1</text>
  <line x1="310" y1="102" x2="310" y2="108" stroke="#374151" stroke-width="1"/>
  <text x="310" y="117" text-anchor="middle" font-size="9" fill="#9ca3af">1</text>
  <line x1="287" y1="85" x2="293" y2="85" stroke="#374151" stroke-width="1"/>
  <text x="284" y="89" text-anchor="end" font-size="9" fill="#9ca3af">1</text>
  <line x1="287" y1="125" x2="293" y2="125" stroke="#374151" stroke-width="1"/>
  <text x="284" y="129" text-anchor="end" font-size="9" fill="#9ca3af">−1</text>
  <!-- Dots at (−3,1) and (2,2) -->
  <circle cx="230" cy="85" r="3.5" fill="#F59E0B"/>
  <text x="217" y="80" font-size="9" fill="#6b7280">(−3,1)</text>
  <circle cx="330" cy="65" r="3.5" fill="#F59E0B"/>
  <text x="334" y="63" font-size="9" fill="#6b7280">(2,2)</text>
  <!-- Line through (−3,1) and (2,2): slope=0.2, y=0.2x+1.6
       At x=−4: y=0.8, At x=4: y=2.4
       SVG: (290−80, 105−16)=(210,89), (290+80, 105−48)=(370,57) -->
  <line x1="210" y1="89" x2="370" y2="57" stroke="#1E3A5F" stroke-width="2"/>
</svg>
