<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 260" width="320" height="260" font-family="system-ui, sans-serif">
  <rect width="320" height="260" fill="white"/>

  <!-- Grid lines -->
  <g stroke="#e2e8f0" stroke-width="0.8">
    <line x1="50" y1="155.7" x2="300" y2="155.7"/>
    <line x1="50" y1="101.4" x2="300" y2="101.4"/>
    <line x1="50" y1="47.1" x2="300" y2="47.1"/>
    <line x1="100" y1="20" x2="100" y2="210"/>
    <line x1="150" y1="20" x2="150" y2="210"/>
    <line x1="200" y1="20" x2="200" y2="210"/>
    <line x1="250" y1="20" x2="250" y2="210"/>
    <line x1="300" y1="20" x2="300" y2="210"/>
  </g>

  <!-- Axes -->
  <line x1="50" y1="20" x2="50" y2="215" stroke="#374151" stroke-width="1.5"/>
  <line x1="45" y1="210" x2="310" y2="210" stroke="#374151" stroke-width="1.5"/>
  <!-- Arrow heads -->
  <polygon points="310,207 310,213 316,210" fill="#374151"/>
  <polygon points="47,20 53,20 50,14" fill="#374151"/>

  <!-- X-axis labels -->
  <text x="50" y="228" text-anchor="middle" font-size="11" fill="#6b7280">0</text>
  <text x="100" y="228" text-anchor="middle" font-size="11" fill="#6b7280">2</text>
  <text x="150" y="228" text-anchor="middle" font-size="11" fill="#6b7280">4</text>
  <text x="200" y="228" text-anchor="middle" font-size="11" fill="#6b7280">6</text>
  <text x="250" y="228" text-anchor="middle" font-size="11" fill="#6b7280">8</text>
  <text x="300" y="228" text-anchor="middle" font-size="11" fill="#6b7280">10</text>
  <text x="180" y="248" text-anchor="middle" font-size="12" fill="#374151" font-weight="600">Days</text>

  <!-- Y-axis labels -->
  <text x="43" y="214" text-anchor="end" font-size="11" fill="#6b7280">0</text>
  <text x="43" y="159" text-anchor="end" font-size="11" fill="#6b7280">1</text>
  <text x="43" y="105" text-anchor="end" font-size="11" fill="#6b7280">2</text>
  <text x="43" y="51" text-anchor="end" font-size="11" fill="#6b7280">3</text>
  <text x="12" y="120" text-anchor="middle" font-size="12" fill="#374151" font-weight="600" transform="rotate(-90,12,120)">Hours</text>

  <!-- Line of best fit: (0,0) to (10,2.2) → SVG (50,210) to (300,90.6) -->
  <line x1="50" y1="210" x2="300" y2="90.6" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Scatter points -->
  <circle cx="75"  cy="183" r="4" fill="#1E3A5F"/>
  <circle cx="100" cy="188" r="4" fill="#1E3A5F"/>
  <circle cx="125" cy="167" r="4" fill="#1E3A5F"/>
  <circle cx="150" cy="156" r="4" fill="#1E3A5F"/>
  <circle cx="175" cy="132" r="4" fill="#1E3A5F"/>
  <circle cx="200" cy="129" r="4" fill="#1E3A5F"/>
  <circle cx="225" cy="112" r="4" fill="#1E3A5F"/>
  <!-- Day 8 highlighted at ~3 hours -->
  <circle cx="250" cy="47"  r="5.5" fill="#F59E0B" stroke="#111827" stroke-width="1.5"/>
  <circle cx="275" cy="96"  r="4" fill="#1E3A5F"/>
  <circle cx="300" cy="91"  r="4" fill="#1E3A5F"/>
</svg>
