<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 200" width="160" height="200" font-family="system-ui, sans-serif">
  <rect width="160" height="200" fill="white" stroke="#cbd5e1" stroke-width="1"/>

  <!-- Header row background -->
  <rect x="0" y="0" width="160" height="40" fill="#f1f5f9"/>

  <!-- Column divider -->
  <line x1="80" y1="0" x2="80" y2="200" stroke="#cbd5e1" stroke-width="1"/>

  <!-- Row dividers -->
  <line x1="0" y1="40"  x2="160" y2="40"  stroke="#cbd5e1" stroke-width="1"/>
  <line x1="0" y1="80"  x2="160" y2="80"  stroke="#e2e8f0" stroke-width="1"/>
  <line x1="0" y1="120" x2="160" y2="120" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="0" y1="160" x2="160" y2="160" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Header text -->
  <text x="40" y="26" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">x</text>
  <text x="120" y="26" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">y</text>

  <!-- Data rows -->
  <text x="40" y="66"  text-anchor="middle" font-size="14" fill="#374151">2</text>
  <text x="120" y="66" text-anchor="middle" font-size="14" fill="#374151">6</text>

  <text x="40" y="106"  text-anchor="middle" font-size="14" fill="#374151">3</text>
  <text x="120" y="106" text-anchor="middle" font-size="14" fill="#374151">9</text>

  <text x="40" y="146"  text-anchor="middle" font-size="14" fill="#374151">4</text>
  <text x="120" y="146" text-anchor="middle" font-size="14" fill="#374151">12</text>

  <text x="40" y="186"  text-anchor="middle" font-size="14" fill="#374151">5</text>
  <text x="120" y="186" text-anchor="middle" font-size="14" fill="#374151">15</text>
</svg>
